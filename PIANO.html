<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano | Matteo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
    <a href="index.html" class="logo">MATTEO</a>
</nav>

<section class="page">
    <h1>Piano</h1>
    <p>
        Suono il pianoforte da oltre 8 anni.  
        La musica è disciplina, emozione e visione.
    </p>
    <img src="PIANO.png" alt="PIANO" class="profile-img">

    <!-- Sezione PLAY -->
    <div class="song-player fade-in">
        <p class="song-name">LALALAND MIA AND SEBASTIAN THEME</p>
        <button class="play-btn">PLAY</button>
    </div>
</section>

<!-- SCRIPT JS incorporato -->
<script>
    const playBtn = document.querySelector('.play-btn');
    const audio = new Audio('LALALAND.mp3'); // il file deve stare nella stessa cartella dell'HTML

    playBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            playBtn.textContent = 'PAUSE';
        } else {
            audio.pause();
            playBtn.textContent = 'PLAY';
        }
    });
</script>

</body>
</html>
